name: CI/CD

on:
  push:
    branches: [ master, dev*, feature/* ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  # ============================================
  # 代码检查
  # ============================================
  code-check:
    name: Code Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file structure
        run: |
          echo "=== Checking project structure ==="
          echo "TC1 directory:"
          ls -la TC1/
          echo ""
          echo "mico-os directory:"
          ls -la mico-os/
          echo ""
          echo "Checking key files..."
          test -f TC1/main.c && echo "✓ main.c exists" || echo "✗ main.c missing"
          test -f TC1/TC1.mk && echo "✓ TC1.mk exists" || echo "✗ TC1.mk missing"
          test -f build.sh && echo "✓ build.sh exists" || echo "✗ build.sh missing"
          test -f TC1/main.h && echo "✓ main.h exists" || echo "✗ main.h missing"

      - name: Check version
        run: |
          echo "=== Checking version ==="
          grep -o 'VERSION "[^"]*"' TC1/main.h || echo "VERSION not found"

      - name: Check web_data generation script
        run: |
          echo "=== Checking web data generation ==="
          cd TC1/http_server
          test -f test.py && echo "✓ test.py exists" || echo "✗ test.py missing"
          python3 --version 2>&1 || echo "Python not available for check"

  # ============================================
  # 固件构建
  # ============================================
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    needs: code-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build MiCO SDK Docker image
        run: |
          echo "=== Building MiCO SDK Docker image ==="
          docker build -t tcz1/mico-sdk:latest -f docker/Dockerfile.mico-sdk .

      - name: Build firmware
        run: |
          echo "=== Building firmware ==="
          chmod +x build.sh
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            tcz1/mico-sdk:latest \
            bash -c "chmod +x build.sh && ./build.sh"
        continue-on-error: true  # 允许构建失败

      - name: Check build artifacts
        run: |
          echo "=== Checking build artifacts ==="
          ls -la build/TC1@MK3031@moc/binary/ || echo "Build artifacts not found"

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build/TC1@MK3031@moc/binary/*.bin
          retention-days: 30

  # ============================================
  # 创建Release（仅tag触发）
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [code-check, build]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ steps.version.outputs.tag }}"
          files: |
            firmware/*.bin
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
