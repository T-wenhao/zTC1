name: CI/CD

on:
  push:
    branches: [ master, dev*, feature/* ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  # ============================================
  # 代码检查
  # ============================================
  code-check:
    name: Code Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file structure
        run: |
          echo "=== Checking project structure ==="
          test -f TC1/main.c && echo "✓ main.c exists" || echo "✗ main.c missing"
          test -f TC1/TC1.mk && echo "✓ TC1.mk exists" || echo "✗ TC1.mk missing"
          test -f build.sh && echo "✓ build.sh exists" || echo "✗ build.sh missing"
          test -f TC1/main.h && echo "✓ main.h exists" || echo "✗ main.h missing"

      - name: Check version
        run: |
          echo "=== Checking version ==="
          grep -o 'VERSION "[^"]*"' TC1/main.h || echo "VERSION not found"

  # ============================================
  # 固件构建
  # ============================================
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    needs: code-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 2.7
        run: |
          echo "=== Installing Python 2.7 ==="
          sudo apt-get update
          sudo apt-get install -y python2.7 python-pip-whl || sudo apt-get install -y python2.7
          
          # 创建python软链接
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          
          # 安装pip for python2.7
          curl -sSL https://bootstrap.pypa.io/pip/2.7/get-pip.py -o get-pip.py
          sudo python2.7 get-pip.py || echo "pip installation failed"
          
          python2.7 --version
          python --version || echo "python command not available"

      - name: Install mico-cube
        run: |
          echo "=== Installing mico-cube ==="
          python2.7 -m pip install mico-cube==1.0.0 || python2.7 -m pip install mico-cube || \
            python -m pip install mico-cube==1.0.0 || python -m pip install mico-cube
          mico --version || echo "mico command not available"

      - name: Setup MiCO SDK
        run: |
          echo "=== Setting up MiCO SDK ==="
          # 下载并安装Micoder
          wget -q http://firmware.mxchip.com/MiCoder_v1.3_Linux64.tar.gz -O micoder.tar.gz || \
            echo "Failed to download Micoder"
          tar -xzf micoder.tar.gz || echo "Failed to extract Micoder"
          
          # 配置Micoder路径
          MICODER_PATH=$(pwd)/MiCoder
          mico config --global MICODER $MICODER_PATH || echo "Failed to config Micoder"
          
          echo "MiCO SDK setup completed"

      - name: Generate web data
        run: |
          echo "=== Generating web data ==="
          cd TC1/http_server
          python2.7 test.py > web_data.c || python test.py > web_data.c
          echo "Web data generated successfully"

      - name: Build firmware
        run: |
          echo "=== Building firmware ==="
          chmod +x build.sh
          ./build.sh
          echo "Build completed"

      - name: Check build artifacts
        run: |
          echo "=== Checking build artifacts ==="
          ls -la build/TC1@MK3031@moc/binary/ || echo "Build artifacts not found"

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build/TC1@MK3031@moc/binary/*.bin
          retention-days: 30

  # ============================================
  # 创建Release（仅tag触发）
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [code-check, build]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ steps.version.outputs.tag }}"
          files: |
            firmware/*.bin
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
