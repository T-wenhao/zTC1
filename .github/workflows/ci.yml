name: CI/CD

on:
  push:
    branches: [ master, dev*, feature/* ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  # ============================================
  # 代码检查
  # ============================================
  code-check:
    name: Code Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file structure
        run: |
          echo "=== Checking project structure ==="
          echo "TC1 directory:"
          ls -la TC1/
          echo ""
          echo "mico-os directory:"
          ls -la mico-os/
          echo ""
          echo "Checking key files..."
          test -f TC1/main.c && echo "✓ main.c exists" || echo "✗ main.c missing"
          test -f TC1/TC1.mk && echo "✓ TC1.mk exists" || echo "✗ TC1.mk missing"
          test -f build.sh && echo "✓ build.sh exists" || echo "✗ build.sh missing"
          test -f TC1/main.h && echo "✓ main.h exists" || echo "✗ main.h missing"

      - name: Check version
        run: |
          echo "=== Checking version ==="
          grep -o 'VERSION "[^"]*"' TC1/main.h || echo "VERSION not found"

      - name: Check web_data generation script
        run: |
          echo "=== Checking web data generation ==="
          cd TC1/http_server
          test -f test.py && echo "✓ test.py exists" || echo "✗ test.py missing"
          python3 --version 2>&1 || echo "Python not available for check"
          python3 test.py > /dev/null 2>&1 && echo "✓ test.py works" || echo "⚠ test.py execution failed"

  # ============================================
  # 创建Release（仅tag触发）
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: code-check
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from code
        id: version
        run: |
          VERSION=$(grep -o 'VERSION "[^"]*"' TC1/main.h | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
